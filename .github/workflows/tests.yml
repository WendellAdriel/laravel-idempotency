name: run-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest]
                php: [8.3, 8.4, 8.5]
                laravel: [13.*]
                testbench: [11.*]
                dependency-version: [prefer-stable]

        name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.dependency-version }}

        steps:
            - name: Checkout code
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

            - name: Setup PHP
              uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none

            - name: Install dependencies
              run: |
                composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "nesbot/carbon:>=2.62.1" --no-interaction --no-update
                composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction

            - name: Code Quality and Tests
              run: composer test
